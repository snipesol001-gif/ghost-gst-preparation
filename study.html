<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost GST - Study Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .flashcard { perspective: 1000px; height: 180px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px; border-radius: 12px; border: 1px solid #2a2a3a; background: #0f0f1a; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .flashcard-back { transform: rotateY(180deg); background: #1a1a2e; border-color: var(--primary); color: var(--text); }
        
        .cram-list { list-style: none; padding: 0; transition: opacity 0.5s ease; }
        .cram-list li { background: rgba(255,255,255,0.03); margin-bottom: 10px; padding: 12px; border-radius: 8px; border-left: 3px solid var(--primary); }
        .cram-list li strong { color: var(--primary); }
    </style>
</head>
<body>
    <!-- BULLETPROOF AUTH & LOGOUT SCRIPT -->
    <script>
        const currentUser = localStorage.getItem('gst_active_user');
        if (!currentUser) { window.location.href = 'index.html'; }
        
        function logout() {
            localStorage.removeItem('gst_active_user');
            localStorage.removeItem('gst_total_points');
            window.location.href = 'index.html';
        }
    </script>

    <!-- REST OF YOUR HTML BELOW... -->
    <div class="container">
        <div class="card">
            <button class="btn-secondary btn-small" onclick="window.location.href='dashboard.html'" style=" width: auto; margin-bottom: 20px;">&larr; Back to Dashboard</button>
            <h1>Study Hub</h1>
            
            <h2>Flashcards (Click to Flip)</h2>
            <p style="color: var(--muted); font-size: 14px; margin-bottom: 15px;">Shuffled every time you visit!</p>
            <div class="grid-2" id="flashcardContainer"></div>

            <div class="note-box" style="margin-top: 40px;">
                <h2 style="color: var(--primary); display: flex; justify-content: space-between; align-items: center;">
                    Quick Cram Notes 
                    <button class="btn-small btn-secondary" onclick="nextCramNote()" style="font-size: 12px;">Next &rarr;</button>
                </h2>
                <p style="color: var(--muted); font-size: 14px;">Showing 5 notes at a time. Auto-refreshes every 8 seconds.</p>
                <ul class="cram-list" id="cramList" style="margin-top: 15px;"></ul>
            </div>
        </div>
    </div>

    <script>
        const flashcards = [
            { q: "What is Consanguinea?", a: "Kinship through blood relation." },
            { q: "Who introduced Indirect Rule?", a: "Lord Frederick Lugard." },
            { q: "What does Acephalous mean?", a: "A society without a centralized head or king (e.g., traditional Igbo)." },
            { q: "Who founded the NNDP in 1922?", a: "Herbert Macaulay." },
            { q: "What is Exogamy?", a: "A rule prohibiting marriage within one's own social group or blood relatives." },
            { q: "Who was the first Oba of Benin's current dynasty?", a: "Eweka I (son of Oranmiyan)." },
            { q: "What is the Oyomesi?", a: "A council of 7 members headed by the Bashorun that checked the Alaafin's power." },
            { q: "Who established the Sokoto Caliphate?", a: "Usman Dan Fodio in 1804." },
            { q: "What is Endogamy?", a: "A rule requiring marriage within one's own social group." },
            { q: "Who was Bayajida?", a: "The legendary founder of the 7 original Hausa states (Hausa Bokwoi)." },
            { q: "What does the 'Ozo' title represent?", a: "A prestigious titleholder in traditional Igbo society." },
            { q: "Who was Ekaladeran?", a: "The banished son of the last Ogiso who founded Ughoton and moved to Ife." },
            { q: "What is the Nokena?", a: "The imperial state council of 12 in Kanem-Bornu." },
            { q: "Who moved the motion for self-government in 1956?", a: "Obafemi Awolowo, leading to the 1953 crisis." }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 1. Render Shuffled Flashcards
        const container = document.getElementById('flashcardContainer');
        shuffle(flashcards).forEach(fc => {
            const div = document.createElement('div');
            div.className = 'flashcard';
            div.innerHTML = `<div class="flashcard-inner"><div class="flashcard-front"><h3>${fc.q}</h3></div><div class="flashcard-back"><p>${fc.a}</p></div></div>`;
            div.onclick = () => div.classList.toggle('flipped');
            container.appendChild(div);
        });

        // 2. Rotating Cram Notes
        const allCramNotes = [
            "Amalgamation (1914): Lord Lugard merged Northern & Southern protectorates for administrative/economic convenience.",
            "Indirect Rule: Successful in North (Centralized Emirs), failed in East (Acephalous/Igbo lacked kings -> Warrant Chiefs invented).",
            "Constitutions: Clifford (1922) = Elective Principle; Richards (1946) = Regionalism; Lyttelton (1954) = True Federalism.",
            "Political Parties: NPC (North/Conservative), AG (West/Progressive), NCNC (East/Nationalist). NEPU represented Talakawa.",
            "Kinship: Consanguinea (blood), Affinity (marriage). Primary (parents), Secondary (uncles), Tertiary (cousins-in-law).",
            "Marriage Rules: Endogamy (marry within group), Exogamy (marry outside group). Polyandry = 1 woman, multiple men.",
            "Origins: Yoruba (Oduduwa/Ile-Ife), Bini (Ogiso -> Eweka I), Hausa (Bayajida), Igbo (Acephalous/Amala Oha assembly).",
            "Kanem-Bornu: Saifawa dynasty. Council of 12 = Nokena. Chief Judge = Maini Kanendi.",
            "Igbo Society: Direct democracy via Amala Oha. Recognition based on age and capability, not family background.",
            "Benin Kingdom: First to exchange ambassadors with Portugal (1481-1504). Guilds organized commoners.",
            "Clifford Constitution: 4 elective seats (3 Lagos, 1 Calabar). NNDP dominated for a decade.",
            "Richards Constitution: Created 3 regions (North, West, East). Condemned for 'divide and rule'.",
            "Macpherson Constitution: Quasi-federal. Led to 1953 Kano riots after AG's self-government motion.",
            "Lyttelton Constitution: True federalism. Exclusive, Concurrent, Residual lists. PM at center, Premiers in regions."
        ];

        let currentNoteIndex = 0;

        function renderCramNotes() {
            const list = document.getElementById('cramList');
            list.style.opacity = 0;
            setTimeout(() => {
                list.innerHTML = "";
                // Show 5 notes at a time
                for(let i = 0; i < 5; i++) {
                    let idx = (currentNoteIndex + i) % allCramNotes.length;
                    let noteText = allCramNotes[idx];
                    // Split by colon for title/body
                    let parts = noteText.split(':');
                    let title = parts[0];
                    let body = parts[1] || "";
                    let li = document.createElement('li');
                    li.innerHTML = `<strong>${title}:</strong> ${body}`;
                    list.appendChild(li);
                }
                list.style.opacity = 1;
            }, 400);
        }

        window.nextCramNote = function() {
            currentNoteIndex = (currentNoteIndex + 5) % allCramNotes.length;
            renderCramNotes();
        }

        renderCramNotes();
        // Auto-rotate every 8 seconds
        setInterval(() => {
            currentNoteIndex = (currentNoteIndex + 5) % allCramNotes.length;
            renderCramNotes();
        }, 8000);
    </script>
</body>
</html>

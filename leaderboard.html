<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost GST - Leaderboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- BULLETPROOF AUTH & LOGOUT SCRIPT -->
    <script>
        const currentUser = localStorage.getItem('gst_active_user');
        if (!currentUser) { window.location.href = 'index.html'; }
        function logout() {
            localStorage.removeItem('gst_active_user');
            window.location.href = 'index.html';
        }
    </script>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="btn-secondary btn-small" onclick="window.location.href='dashboard.html'" style="width: auto;">&larr; Back</button>
                <button class="btn-secondary btn-small" onclick="logout()" style="width: auto;">🚪 Logout</button>
            </div>
            <h1>🏆 Global Leaderboard</h1>
            <p style="color: var(--muted); margin-bottom: 20px;">Top performers across the Ghost GST platform.</p>

            <!-- Top 3 Glassmorphism Podium -->
            <div class="podium-container" id="podiumContainer">
                <div class="podium-item podium-2">
                    <div class="podium-icon-wrapper">🥈</div>
                    <h3 id="rank2Name">-</h3>
                    <div class="points" id="rank2Points">0</div>
                    <div class="tier" id="rank2Tier">-</div>
                </div>
                <div class="podium-item podium-1">
                    <div class="podium-icon-wrapper crown-1">👑</div>
                    <div class="podium-icon-wrapper" style="top: -15px;">🥇</div>
                    <h3 id="rank1Name">-</h3>
                    <div class="points" id="rank1Points">0</div>
                    <div class="tier" id="rank1Tier">-</div>
                </div>
                <div class="podium-item podium-3">
                    <div class="podium-icon-wrapper">🥉</div>
                    <h3 id="rank3Name">-</h3>
                    <div class="points" id="rank3Points">0</div>
                    <div class="tier" id="rank3Tier">-</div>
                </div>
            </div>

            <table class="leaderboard-table" id="rankTable">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Username</th>
                        <th>Tier</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="4" style="text-align: center; color: var(--muted);">Loading leaderboard...</td></tr>
                </tbody>
            </table>

            <div class="your-rank-box" id="yourRankBox" style="display: none;">
                <span>Your Position: <strong id="yourRankNum">#0</strong></span> | 
                <span>Points: <strong id="yourRankPoints">0</strong></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from "./js/firebase.js";
        
        function getRank(totalPoints) {
            if (totalPoints >= 1000) return "Legendary";
            if (totalPoints >= 500) return "Gold";
            if (totalPoints >= 200) return "Silver";
            if (totalPoints >= 50) return "Bronze";
            return "Rookie";
        }

        try {
            const scoresRef = ref(db, 'scores/');
            onValue(scoresRef, (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = '';

                if (!data) {
                    // If no one has taken an exam yet
                    document.getElementById('rank1Name').innerText = "No scores yet";
                    document.getElementById('rank2Name').innerText = "-";
                    document.getElementById('rank3Name').innerText = "-";
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--muted);">Take an exam to be the first on the board!</td></tr>';
                    return;
                }

                let users = Object.values(data).sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

                for (let i = 0; i < 3; i++) {
                    if (users[i]) {
                        document.getElementById(`rank${i+1}Name`).innerText = users[i].username;
                        document.getElementById(`rank${i+1}Points`).innerText = `${users[i].totalPoints || 0} pts`;
                        document.getElementById(`rank${i+1}Tier`).innerText = getRank(users[i].totalPoints || 0);
                    }
                }

                for (let i = 3; i < Math.min(10, users.length); i++) {
                    const u = users[i];
                    const tr = document.createElement('tr');
                    if (u.username === currentUser) tr.classList.add('current-user');
                    tr.innerHTML = `<td>#${i + 1}</td><td>${u.username} ${u.username === currentUser ? '(You)' : ''}</td><td>${getRank(u.totalPoints || 0)}</td><td>${u.totalPoints || 0}</td>`;
                    tbody.appendChild(tr);
                }

                const userIndex = users.findIndex(u => u.username === currentUser);
                if (userIndex >= 10) {
                    document.getElementById('yourRankBox').style.display = 'block';
                    document.getElementById('yourRankNum').innerText = `#${userIndex + 1}`;
                    document.getElementById('yourRankPoints').innerText = `${users[userIndex].totalPoints || 0} pts`;
                }
            }, (error) => {
                // This catches Firebase permission errors!
                console.error("Firebase Error:", error);
                document.getElementById('leaderboardBody').innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--danger);">Error loading data. Check console (F12).</td></tr>`;
            });
        } catch (e) {
            console.error("Module Import Error:", e);
        }
    </script>
</body>
</html>

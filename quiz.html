<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost GST - Exam</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: #141423; padding: 30px; border-radius: 16px; border: 1px solid #2a2a3a; width: 350px; text-align: center; }
        .modal-box h2 { color: var(--danger); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { margin-top: 0; }
    </style>
</head>
<body>
    <!-- BULLETPROOF AUTH & LOGOUT SCRIPT -->
    <script>
        const currentUser = localStorage.getItem('gst_active_user');
        if (!currentUser) { window.location.href = 'index.html'; }
        
        function logout() {
            localStorage.removeItem('gst_active_user');
            localStorage.removeItem('gst_total_points');
            window.location.href = 'index.html';
        }
    </script>

    <!-- REST OF YOUR HTML BELOW... -->
    <div class="container">
        <div class="card">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div id="quizContent">
                <p style="color: var(--primary); margin-bottom: 10px;">Question <span id="qNum">1</span> of 40</p>
                <h2 id="questionText" style="font-size: 22px; margin-bottom: 20px;"></h2>
                
                <div id="optionsContainer"></div>
                
                <div class="explanation" id="explanationBox">
                    <strong style="color: var(--primary);">Explanation:</strong>
                    <p id="explanationText"></p>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button id="prevBtn" onclick="prevQuestion()" style="display: none; background: transparent; border: 1px solid #fff; width: 100%;">Previous</button>
                    <button id="nextBtn" onclick="nextQuestion()" style="display: none; width: 100%;">Next Question</button>
                </div>

                <!-- NEW: Early Submit Button -->
                <button id="submitEarlyBtn" onclick="confirmSubmit()" style="background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 10px;">Submit Exam Early</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="submitModal">
        <div class="modal-box">
            <h2>Submit Exam?</h2>
            <p style="margin: 15px 0;">You haven't answered all the questions. Are you sure you want to end the exam now?</p>
            <div class="modal-btns">
                <button onclick="finishExam()" style="background: var(--danger);">Yes, Submit</button>
                <button class="btn-secondary" onclick="closeSubmitModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/questions.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
